name: E2E Stress Test

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:
    inputs:
      runs:
        description: "Number of times to repeat each test"
        required: false
        default: "10"
      target_url:
        description: "Base URL to test against"
        required: false
        default: "https://diana-tnbc.vercel.app"

permissions:
  contents: read

jobs:
  stress:
    name: Stress (${{ github.event.inputs.runs || '10' }}x)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      TEST_ENV: prod
      PROD_URL: ${{ github.event.inputs.target_url || 'https://diana-tnbc.vercel.app' }}
      PLAYWRIGHT_REPEAT_EACH: ${{ github.event.inputs.runs || '10' }}
      VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        working-directory: apps/web
        run: bunx playwright install --with-deps chromium

      - name: Run e2e stress test
        working-directory: apps/web
        run: bunx playwright test --project=tests --repeat-each=${PLAYWRIGHT_REPEAT_EACH} --reporter=list,html

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report
          retention-days: 14

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: apps/web/test-results
          retention-days: 14
