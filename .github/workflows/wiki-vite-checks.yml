name: Wiki Vite Checks

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - "apps/wiki-vite/**"
      - "packages/wiki-content/**"
      - "packages/wiki-markdown/**"
      - "packages/wiki-shell/**"
      - "packages/smart-table/**"
      - "packages/chat/**"
      - "web/convex/**"
      - "package.json"
      - "bun.lock"
      - ".github/workflows/wiki-vite-checks.yml"
  workflow_dispatch:

concurrency:
  group: wiki-vite-checks-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  deployments: read
  pull-requests: read
  statuses: read

jobs:
  static:
    name: Vite Static
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - name: Install dependencies
        run: bun install --frozen-lockfile || (bun pm cache rm && bun install --frozen-lockfile)

      - name: Run static, lint, typecheck, and bundle checks
        run: bun run verify:wiki-vite:static

  unit:
    name: Vite Unit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - name: Install dependencies
        run: bun install --frozen-lockfile || (bun pm cache rm && bun install --frozen-lockfile)

      - name: Run Vite unit tests
        run: bun run verify:wiki-vite:unit

  server:
    name: Vite Server
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - name: Install dependencies
        run: bun install --frozen-lockfile || (bun pm cache rm && bun install --frozen-lockfile)

      - name: Install Playwright browsers
        working-directory: apps/wiki-vite
        run: bunx playwright install --with-deps chromium

      - name: Verify standalone server
        run: bun run verify:wiki-vite:server

  preview-url:
    name: Resolve Vite Preview URL
    runs-on: ubuntu-latest
    outputs:
      url: ${{ steps.resolve.outputs.url }}
    steps:
      - uses: actions/checkout@v5

      - name: Wait for Vite Vercel preview deployment
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          VERCEL_PROJECT: ${{ vars.WIKI_VITE_VERCEL_PROJECT || 'diana-tnbc-wiki-vite' }}
        shell: bash
        run: |
          set -euo pipefail

          for attempt in $(seq 1 40); do
            deployment_id="$(
              gh api "repos/${REPOSITORY}/deployments?sha=${HEAD_SHA}&per_page=40" \
                | jq -r --arg project "${VERCEL_PROJECT}" \
                    '[.[] | select(.environment | startswith("Preview")) | select((.payload.project // "") == $project or (.environment | endswith($project)))] | first | .id // empty'
            )"

            if [[ -z "${deployment_id}" ]]; then
              echo "Vite preview deployment not created yet (attempt ${attempt}/40)."
              sleep 15
              continue
            fi

            status_json="$(gh api "repos/${REPOSITORY}/deployments/${deployment_id}/statuses" | jq 'first')"
            state="$(jq -r '.state // empty' <<<"${status_json}")"
            preview_url="$(jq -r '.environment_url // .target_url // empty' <<<"${status_json}")"
            description="$(jq -r '.description // empty' <<<"${status_json}")"

            case "${state}" in
              success)
                if [[ -n "${preview_url}" ]]; then
                  echo "url=${preview_url}" >> "${GITHUB_OUTPUT}"
                  exit 0
                fi
                ;;
              failure|error)
                echo "Vite preview deployment failed: ${description}" >&2
                if [[ -n "${preview_url}" ]]; then
                  echo "Failed Vite preview URL: ${preview_url}" >&2
                fi
                exit 1
                ;;
            esac

            echo "Vite preview state: ${state:-unknown} (attempt ${attempt}/40)."
            sleep 15
          done

          echo "Timed out waiting for the Vite preview deployment." >&2
          exit 1

  e2e-preview:
    name: Vite E2E (Preview ${{ matrix.shard }}/4)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: preview-url
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - name: Install dependencies
        run: bun install --frozen-lockfile || (bun pm cache rm && bun install --frozen-lockfile)

      - name: Install Playwright browsers
        working-directory: apps/wiki-vite
        run: bunx playwright install --with-deps chromium

      - name: Run Vite e2e shard against preview
        working-directory: apps/wiki-vite
        env:
          PLAYWRIGHT_BASE_URL: ${{ needs.preview-url.outputs.url }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: bun run test:e2e -- --shard=${{ matrix.shard }}/4

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: wiki-vite-preview-playwright-report-${{ matrix.shard }}
          path: apps/wiki-vite/playwright-report
          retention-days: 7
